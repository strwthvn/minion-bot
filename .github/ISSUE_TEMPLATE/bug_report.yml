name: Баг-репорт
description: Сообщить об ошибке в работе бота
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Описание бага
      description: Что пошло не так?
      placeholder: Бот не отвечает на команду /event list
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Как воспроизвести
      description: Пошаговые действия, которые приводят к ошибке
      placeholder: |
        1. Вызвать команду /event list
        2. Выбрать фильтр "upcoming"
        3. Нажать кнопку "Вперёд"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно было произойти?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: Что произошло на самом деле?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Скриншоты
      description: Если есть — приложи скриншоты
    validations:
      required: false
